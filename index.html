<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panda Telecom 熊貓電訊</title>
  <style>
    :root {
      --bg: #ffffff;
      --black: #111111;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Noto Sans CJK HK", sans-serif;
      color: var(--black);
      background: var(--bg);
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--black);
      color: #fff;
      display: grid; place-items: center;
      font-weight: bold;
      font-size: 14px;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
    }
    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 36px 0 14px;
    }
    ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }
    .contact {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      margin-top: 40px;
      font-size: 15px;
      color: var(--muted);
    }
    footer {
      margin-top: 40px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">熊貓</div>
      <div>
        <div class="title">Panda Telecom 熊貓電訊</div>
        <div class="sub">九龍紅磡 · 黃埔108商場</div>
      </div>
    </header>

    <h2>服務</h2>
    <ul>
      <li>Google 帳號 / FRP 解鎖</li>
      <li>換 mon</li>
      <li>換電</li>
      <li>刷機 / 系統異常</li>
      <li>主板維修</li>
      <li>零件更換</li>
    </ul>

    <h2>機種</h2>
    <p>Samsung、Xiaomi、Redmi、POCO、iPhone</p>

    <div class="contact">
      地區：九龍紅磡<br/>
      地址：民泰街25號黃埔108商場54號舖<br/>
      電話：+852 6855 7181<br/>
      Facebook：PandaTelecomHK<br/>
      WhatsApp：<a href="https://wa.me/85268557181" target="_blank" rel="noopener">+852 6855 7181</a><br/>
      營業時間：09:00 - 19:00<br/>
      <a href="https://maps.google.com/?q=熊貓電訊+Panda+Telecom" target="_blank" rel="noopener">地圖</a>
    </div>

    <footer>© Panda Telecom 熊貓電訊</footer>
  </div>
</body>
</html>
