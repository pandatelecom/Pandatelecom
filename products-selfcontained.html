:root{--bg:#fff;--black:#111;--muted:#6b7280;--border:#e5e7eb;--accent:#ee5a6f}

.section-head .count{background:#fef2f4;color:var(--accent);font-size:12px;padding:3px 10px;border-radius:10px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);border:1px solid #f0f0f0;transition:transform .15s ease,box-shadow .15s ease;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08)}
.card-thumb{width:100%;height:150px;background:#fafafa;display:grid;place-items:center;color:#bbb;font-size:12px}
.card-body{padding:10px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
.card-sku{font-size:10px;color:#aaa;letter-spacing:.5px}
.card-name{font-size:12px;font-weight:600;color:#222;line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-prices{margin-top:auto;display:flex;align-items:baseline;gap:6px}
.card-res{font-size:1.15em;font-weight:700;color:var(--accent)}
.card-srp{font-size:12px;color:#bbb;text-decoration:line-through}

.contact-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;box-shadow:0 -2px 18px rgba(0,0,0,.06);display:flex;gap:10px;justify-content:center;flex-wrap:wrap;z-index:30}
.contact-bar a{padding:12px 20px;border-radius:25px;color:#fff;font-weight:600;text-decoration:none;font-size:14px}
.btn-wa{background:#25D366}.btn-tel{background:var(--accent)}

.empty{text-align:center;padding:60px 20px;color:#888}
footer.main{max-width:1200px;margin:0 auto;text-align:center;padding:36px 16px 90px;color:#aaa;font-size:12px}

function render(q,cat){q=(q||'').toLowerCase().trim();cat=cat||'';let out='',has=false;DATA.cats.forEach(c=>{if(cat&&c!==cat)return;const items=DATA.products.filter(p=>p.cat===c);if(!items.length)return;const show=items.filter(p=>!q||p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q));if(!show.length)return;has=true;out+=`<div class="section"><div class="section-head">${c} <span class="count">${show.length} 款</span></div><div class="grid">`;show.forEach(p=>{out+=`<div class="card"><div class="card-thumb"><img src="${IMG[p.sku] || ''}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.parentNode.innerHTML='📦'" /></div><div class="card-body"><div class="card-sku">${p.sku||''}</div><div class="card-name">${p.name}</div><div class="card-prices"><div class="card-res">$${p.srp}</div></div></div>`});out+='</div></div>'});if(!has)out='<div class="empty">😕 冇搵到相關產品<br><small>試下其他關鍵字</small></div>';document.getElementById('list').innerHTML=out}
const bar=document.getElementById('cats');const allBtn=document.createElement('span');allBtn.className='cat-chip on';allBtn.textContent='全部';allBtn.onclick=()=>{render(document.getElementById('search').value);bar.querySelectorAll('.cat-chip').forEach(x=>x.classList.remove('on'));allBtn.classList.add('on')};bar.appendChild(allBtn);DATA.cats.forEach(c=>{const b=document.createElement('span');b.className='cat-chip';b.textContent=c;b.onclick=()=>{render(document.getElementById('search').value,c);bar.querySelectorAll('.cat-chip').forEach(x=>x.classList.remove('on'));b.classList.add('on')};bar.appendChild(b)});


</script>
