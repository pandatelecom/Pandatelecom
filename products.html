<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panda Telecom 熊貓電訊 — 產品目錄</title>
<meta name="description" content="Momax 手機配件、充電器、保護殼等產品，最新價目表。紅磡黃埔實體店。" />
<style>
:root {
  --primary: #111111;
  --accent: #e91e63;
  --accent2: #25D366;
  --text: #222;
  --muted: #888;
  --bg: #f8f8f8;
  --border: #e5e7eb;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Noto Sans CJK HK", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* Status bar */
.status-bar {
  background: var(--primary);
  color: #fff;
  text-align: center;
  font-size: 12px;
  padding: 5px 16px;
  font-weight: 500;
  transition: background .5s;
}
.status-bar.open { background: #15803d; }
.status-bar.closed { background: #92400e; }

/* Nav */
nav {
  background: #fff; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
nav .inner {
  max-width: 980px; margin: 0 auto; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 15px;
  text-decoration: none; color: var(--text);
}
.logo-mark {
  width: 30px; height: 30px;
  background: var(--primary); color: #fff;
  border-radius: 7px;
  display: grid; place-items: center;
  font-size: 10px; font-weight: 800;
}
.nav-back {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border-radius: 8px;
  background: #f0f0f0; color: #333;
  text-decoration: none; font-size: 13px;
}
.nav-back:hover { background: #e5e5e5; }

.main { max-width: 980px; margin: 0 auto; padding: 16px; }

/* Banner */
.banner {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  border-radius: 16px;
  padding: 28px 24px;
  margin: 8px 0 16px;
  color: #fff;
}
.banner h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.banner p { font-size: 13px; opacity: .85; }

/* Search & Filters */
.search-wrap { margin: 12px 0; }
.search-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  transition: border-color .2s;
  background: #fff;
}
.search-input:focus { border-color: var(--accent); }

.cats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px 0 16px;
}
.cat-chip {
  padding: 6px 14px;
  border-radius: 20px;
  background: #fff;
  border: 1px solid var(--border);
  font-size: 12px;
  color: #666;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.cat-chip:hover { border-color: #bbb; }
.cat-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 100px; }
.card {
  background: #fff; border-radius: var(--radius);
  overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06);
  transition: transform .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
.card-thumb {
  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  font-size: 36px;
}
.card-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; padding: 8px; }
.card-body { padding: 10px 12px 12px; }
.card-sku { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-prices { font-size: 15px; color: var(--accent); font-weight: 700; }

.empty-state { text-align: center; padding: 60px 20px; color: #bbb; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }
.empty-state small { font-size: 12px; }

.cat-heading {
  font-weight: 700; font-size: 16px; color: #333;
  margin: 16px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.cat-heading .count { color: #999; font-size: 13px; font-weight: 400; }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 10px 0;
  font-size: 13px;
  color: var(--muted);
  align-items: center;
  flex-wrap: wrap;
}
.stats-bar .stat { display: flex; align-items: center; gap: 4px; }

/* Footer */
.footer-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 10px;
  z-index: 100;
}
.footer-bar .btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  text-decoration: none;
  color: #fff;
  font-weight: 600;
  font-size: 14px;
}
.footer-bar .btn-call { background: var(--primary); }
.footer-bar .btn-call:hover { background: #2a2a2a; }
.footer-bar .btn-wa { background: var(--accent2); }
.footer-bar .btn-wa:hover { background: #1da851; }

.site-footer {
  text-align: center;
  font-size: 11px;
  color: #bbb;
  padding: 16px 0 80px;
}
</style>
</head>
<body>

<div class="status-bar" id="statusBar">🕐 檢查營業狀態中…</div>

<nav>
  <div class="inner">
    <a href="./" class="nav-brand">
      <div class="logo-mark">熊貓</div>
      <span>Panda Telecom</span>
    </a>
    <div style="display:flex;gap:6px;">
      <a class="nav-back" href="./">← 主頁</a>
    </div>
  </div>
</nav>

<div class="main">

<div class="banner">
  <h1>📱 Momax 產品目錄</h1>
  <p>最新價目表 · WhatsApp 查詢庫存及報價</p>
</div>

<div class="stats-bar" id="statsBar">
  <span class="stat">📦 <span id="prodCount">0</span> 件產品</span>
  <span class="stat">🏷️ <span id="catCount">0</span> 個分類</span>
</div>

<div class="search-wrap">
  <input class="search-input" id="search" placeholder="🔍 搜尋產品名、型號或類別..." autocomplete="off">
</div>
<div class="cats" id="cats"></div>

<div id="list"></div>

<div class="site-footer">© 2026 Panda Telecom · 資料來源：Momax 價目表</div>

</div>

<div class="footer-bar">
  <a class="btn btn-call" href="tel:+852****7181">📞 致電 6855 7181</a>
  <a class="btn btn-wa" href="https://wa.me/85268557181?text=我想查詢Momax產品" target="_blank" rel="noopener">💬 WhatsApp 詢價</a>
</div>

<script src="products-data.js"></script>
<script src="products-img-map.js"></script>
<script>
(function(){
  var IMG = typeof PROD_IMG !== 'undefined' ? PROD_IMG : {};

  // Stats
  document.getElementById('prodCount').textContent = DATA.products.length;
  document.getElementById('catCount').textContent = DATA.cats.length;

  function render(q, cat){
    q = (q || '').toLowerCase().trim();
    cat = cat || '';
    var out = '', has = false;
    DATA.cats.forEach(function(c){
      if(cat && c !== cat) return;
      var items = DATA.products.filter(function(p){ return p.cat === c; });
      if(!items.length) return;
      var show = q ? items.filter(function(p){ return p.name.toLowerCase().indexOf(q) !== -1; }) : items;
      if(!show.length) return;
      has = true;
      out += '<div class="cat-heading">' + c + ' <span class="count">' + show.length + ' 款</span></div>';
      out += '<div class="grid">';
      show.forEach(function(p){
        var img = IMG[p.sku] ? '<img src="'+IMG[p.sku]+'" alt="'+p.name+'" loading="lazy" onerror="this.style.display=\'none\'">' : '📦';
        out += '<div class="card">';
        out += '<div class="card-thumb">'+img+'</div>';
        out += '<div class="card-body">';
        if(p.sku) out += '<div class="card-sku">'+p.sku+'</div>';
        out += '<div class="card-name">'+p.name+'</div>';
        out += '<div class="card-prices">$'+p.srp+'</div>';
        out += '</div></div>';
      });
      out += '</div>';
    });
    if(!has) {
      out = '<div class="empty-state"><div class="empty-icon">😕</div><p>冇搵到相關產品</p><small>試下其他關鍵字</small></div>';
    }
    document.getElementById('list').innerHTML = out;
  }

  var bar = document.getElementById('cats');
  var allBtn = document.createElement('span');
  allBtn.className = 'cat-chip on';
  allBtn.textContent = '全部';
  allBtn.onclick = function(){
    render(document.getElementById('search').value);
    bar.querySelectorAll('.cat-chip').forEach(function(x){ x.classList.remove('on'); });
    allBtn.classList.add('on');
  };
  bar.appendChild(allBtn);
  DATA.cats.forEach(function(c){
    var b = document.createElement('span');
    b.className = 'cat-chip';
    b.textContent = c;
    b.onclick = function(){
      render(document.getElementById('search').value, c);
      bar.querySelectorAll('.cat-chip').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
    };
    bar.appendChild(b);
  });

  var searchEl = document.getElementById('search');
  var searchTimer;
  searchEl.addEventListener('input', function(e){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function(){ render(e.target.value); }, 150);
  });
  render('', '');

  // Status bar
  (function(){
    var bar = document.getElementById('statusBar');
    var now = new Date();
    var hk = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Hong_Kong'}));
    var h = hk.getHours(), m = hk.getMinutes();
    var totalMin = h * 60 + m;
    var isOpen = (totalMin >= 540 && totalMin < 1140); // 09:00-19:00
    if(isOpen) { bar.textContent = '🟢 而家營業中 · 09:00-19:00'; bar.className = 'status-bar open'; }
    else if(totalMin < 540) { bar.textContent = '🟠 未開門 · 今日 09:00 開舖'; bar.className = 'status-bar closed'; }
    else { bar.textContent = '🔴 已關門 · 聽日 09:00 再開'; bar.className = 'status-bar closed'; }
  })();
})();
</script>
</body>
</html>
