<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Telecom 熊貓電訊 - 產品價目</title>
<style>
:root{--accent:#e91e63;--accent2:#25d366;--text:#222;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#f5f5f5}
.main{max-width:980px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.brand{font-size:18px;font-weight:700;color:var(--text)}
.brand small{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:2px}
.back{padding:6px 12px;border-radius:8px;background:#f0f0f0;color:#333;text-decoration:none;font-size:13px}
.banner{background:linear-gradient(135deg,#ff9a9e,#fecfef,#f8a5a5);border-radius:12px;padding:20px;margin:10px 0;color:#fff}
.banner h1{font-size:22px;margin-bottom:6px}
.banner p{font-size:13px;opacity:.9}
.search{margin:12px 0;padding:10px 14px;border-radius:10px;border:1px solid #ddd;width:100%;font-size:16px}
.cats{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
.cat-chip{padding:5px 10px;border-radius:20px;background:#fff;border:1px solid #eee;font-size:12px;color:#666;cursor:pointer}
.cat-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:80px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-thumb{height:150px;display:flex;align-items:center;justify-content:center;background:#fff;font-size:40px}
.card-thumb img{max-width:100%;max-height:100%;object-fit:contain}
.card-body{padding:10px}
.card-sku{font-size:11px;color:var(--muted);margin-bottom:2px}
.card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3}
.card-prices{font-size:14px;color:var(--accent);font-weight:700}
.footer{text-align:center;font-size:11px;color:#bbb;padding:20px 0 80px}
.actions{display:flex;gap:10px;margin:10px 0}
.btn{flex:1;padding:14px;border-radius:12px;text-align:center;text-decoration:none;color:#fff;font-weight:600}
.btn-call{background:var(--accent)}.btn-wa{background:var(--accent2)}
.empty{text-align:center;padding:40px;color:#bbb}
</style>
</head>
<body>
<div class="main">
<div class="header">
<div class="brand">Panda Telecom 熊貓電訊<small>九龍紅磡 · 黃埔108</small></div>
<a class="back" href="./">← 返回主頁</a>
</div>
<div class="banner">
<h1>📱 Momax 產品目錄</h1>
<p>2026年5月價目表 · 客戶價以本店報價為準</p>
</div>
<input class="search" id="search" placeholder="🔍 輸入產品名稱 / 型號 / 類別...">
<div class="cats" id="cats"></div>
<div id="list"></div>
<div class="footer">© 2026 Panda Telecom · 資料來源：Momax 2026-05-01 價目表</div>
<div class="actions">
<a class="btn btn-call" href="tel:+852****7181">📞 致電 6855 7181</a>
<a class="btn btn-wa" href="https://wa.me/85268557181?text=%E6%88%91%E6%83%B3%E6%9F%A5%E8%A9%A2Momax%E5%95%86%E5%93%81">💬 WhatsApp 詢價</a>
</div>
</div>
<script src="products-data.js"></script>
<script>
const IMG = {"MS02L2": "https://cdn.shopify.com/s/files/1/0800/4727/6344/files/MS02_L2_01_1500_Additional_JPG_Medium_a0e638c5-d5f5-49ec-a129-fc0fc48aede4.jpg", "BR16D": "https://cdn.shopify.com/s/files/1/0800/4727/6344/products/BR16_BilkQR_1080_972c35e0-1e44-4e87-8d6a-1b2f4d5c6a7b_1500.png", "BS13D": "https://cdn.shopify.com/s/files/1/0800/4727/6344/products/BS13D-Black-Main_1500.png", "BS13M": "https://cdn.shopify.com/s/files/1/0800/4727/6344/products/BS13M-Orange-Main_1500.png", "BS13W": "https://cdn.shopify.com/s/files/1/0800/4727/6344/products/BS13W-White-Main_1500.png", "BS6HKD": "https://hk.momax.net/cdn/shop/files/BS6_D_01_1500.webp?v=1774800350&width=1500", "BS6HKL": "https://hk.momax.net/cdn/shop/files/BS6_L_01_1500.jpg?v=1774800350&width=1500", "BS6HKL2": "https://hk.momax.net/cdn/shop/files/BS6_L2_01_1500.webp?v=1774800350&width=1500", "BS6HKM": "https://hk.momax.net/cdn/shop/files/BS6_M_01_1500.jpg?v=1774800350&width=1500", "BS6HKS": "https://hk.momax.net/cdn/shop/files/BS6_S_01_1500.jpg?v=1774800350&width=1500", "BS7D": "https://hk.momax.net/cdn/shop/files/BS7_D_01_1500.jpg?v=1776009677&width=1500", "BS7E": "https://hk.momax.net/cdn/shop/files/BS7_E_01_1500.jpg?v=1776009677&width=1500", "BS7M": "https://hk.momax.net/cdn/shop/files/BS7_M_01_1500.jpg?v=1776009677&width=1500", "BS8D": "https://hk.momax.net/cdn/shop/files/BS8_D_04_1500.jpg?v=1760289049&width=1500", "BS8W": "https://hk.momax.net/cdn/shop/files/BS8_W_04_1500.jpg?v=1760289049&width=1500"};

function render(q,cat){
  q=(q||"").toLowerCase().trim();cat=cat||"";
  var out="",has=false;
  DATA.cats.forEach(function(c){
    if(cat&&c!==cat)return;
    var items=DATA.products.filter(function(p){return p.cat===c});
    if(!items.length)return;
    var show=q?items.filter(function(p){return p.name.toLowerCase().includes(q)}):items;
    if(!show.length)return;
    has=true;
    out+='<div style="margin:16px 0"><div style="font-weight:700;font-size:16px;margin-bottom:10px;color:#333">'+c+' <span style="color:#999;font-size:13px">'+show.length+' 款</span></div><div class="grid">';
    show.forEach(function(p){
      var img=IMG[p.sku]?'<img src="'+IMG[p.sku]+'" alt="'+p.name+'" loading="lazy" onerror="this.style.display=\'none\'">':'📦';
      out+='<div class="card"><div class="card-thumb">'+img+'</div><div class="card-body"><div class="card-sku">'+(p.sku||'')+'</div><div class="card-name">'+p.name+'</div><div class="card-prices">$'+p.srp+'</div></div></div>';
    });
    out+='</div></div>';
  });
  if(!has)out='<div class="empty">😕 冇搵到相關產品<br><small>試下其他關鍵字</small></div>';
  document.getElementById('list').innerHTML=out;
}

var bar=document.getElementById('cats');
var allBtn=document.createElement('span');
allBtn.className='cat-chip on';allBtn.textContent='全部';
allBtn.onclick=function(){
  render(document.getElementById('search').value);
  bar.querySelectorAll('.cat-chip').forEach(function(x){x.classList.remove('on')});
  allBtn.classList.add('on');
};
bar.appendChild(allBtn);
DATA.cats.forEach(function(c){
  var b=document.createElement('span');b.className='cat-chip';b.textContent=c;
  b.onclick=function(){
    render(document.getElementById('search').value,c);
    bar.querySelectorAll('.cat-chip').forEach(function(x){x.classList.remove('on')});
    b.classList.add('on');
  };
  bar.appendChild(b);
});
document.getElementById('search').addEventListener('input',function(e){render(e.target.value)});
render("","");
</script>
</body>
</html>
