<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Telecom — 產品相片管理</title>
<style>
:root{--bg:#0d0d0d;--card:#1a1a1a;--text:#e5e5e5;--muted:#888;--border:#2a2a2a;--gold:#d4a02b;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* Login */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:380px;max-width:100%;text-align:center}
.login-box .icon{font-size:64px;margin-bottom:12px}
.login-box h1{font-size:22px;margin-bottom:4px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;outline:none;margin-bottom:14px;transition:border-color .2s;font-family:inherit}
.login-box input:focus{border-color:var(--gold)}
.login-box button{width:100%;padding:12px;border-radius:25px;border:none;background:var(--gold);color:#111;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.login-box button:hover{background:#c4961a}
.login-box .error{color:var(--red);font-size:13px;margin-top:10px;display:none}
.admin-screen{display:none}
/* Header */
.hdr{background:#111;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr h2{font-size:16px;font-weight:700}
.hdr-actions{display:flex;gap:8px;flex-wrap:wrap}
.hdr-actions button,.hdr-actions a{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none}
.btn-preview{background:var(--blue);color:#fff}.btn-preview:hover{background:#2563eb}
.btn-deploy{background:var(--green);color:#111}.btn-deploy:hover{background:#16a34a}
.btn-logout{background:var(--card);border:1px solid var(--border)!important;color:var(--muted)}.btn-logout:hover{color:var(--text)}
/* Stats */
.stats{display:flex;gap:16px;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap}
.stat{padding:6px 14px;border-radius:8px;font-weight:600}
.stat.green{background:rgba(34,197,94,.15);color:var(--green)}
.stat.red{background:rgba(239,68,68,.15);color:var(--red)}
.stat.blue{background:rgba(59,130,246,.15);color:var(--blue)}
.stat.gold{background:rgba(212,160,43,.15);color:var(--gold)}
/* Container */
.container{max-width:1100px;margin:0 auto;padding:24px}
/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;flex:1;min-width:180px;font-family:inherit}
.toolbar input:focus{border-color:var(--gold)}
.toolbar select{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none;cursor:pointer;font-family:inherit}
.toolbar select:focus{border-color:var(--gold)}
.filter-btns{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#111;font-weight:700}
.filter-btn.g{color:var(--green)}.filter-btn.g.active{background:var(--green);color:#111}
.filter-btn.r{color:var(--red)}.filter-btn.r.active{background:var(--red);color:#111}

/* Product Cards */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.prod-card:hover{border-color:#555}
.prod-card .top{display:flex;gap:14px;padding:14px}
.prod-card .thumb{width:90px;height:90px;border-radius:8px;background:#222;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:32px;color:var(--muted);position:relative}
.prod-card .thumb img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px}
.prod-card .thumb .pending-badge{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--gold);color:#111;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.4)}
.prod-card .info{flex:1;min-width:0}
.prod-card .info .sku{font-size:11px;color:var(--muted);margin-bottom:1px}
.prod-card .info .name{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-card .info .cat{font-size:11px;color:var(--muted);margin-bottom:2px}
.prod-card .info .price{font-size:13px;color:var(--gold);font-weight:700}
.prod-card .bottom{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap}
.photo-badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:600}
.photo-badge.yes{background:rgba(34,197,94,.15);color:var(--green)}
.photo-badge.no{background:rgba(239,68,68,.15);color:var(--red)}
.photo-badge.pending{background:rgba(212,160,43,.15);color:var(--gold)}

.prod-card .btn-photo{flex:1;padding:7px 12px;border-radius:18px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;min-width:80px}
.prod-card .btn-add{background:var(--gold);color:#111}.prod-card .btn-add:hover{background:#c4961a}
.prod-card .btn-replace{background:var(--blue);color:#fff}.prod-card .btn-replace:hover{background:#2563eb}
.prod-card .btn-del{background:transparent;color:var(--red);border:1px solid var(--red)!important;padding:6px 10px;border-radius:15px;font-size:10px}
.prod-card .btn-del:hover{background:var(--red);color:#fff}
.prod-card input[type=file]{display:none}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .big{font-size:48px;display:block;margin-bottom:12px}
.empty-state p{font-size:14px}

/* Pending Bar */
.pending-bar{background:var(--card);border:1px solid var(--gold);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:none;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.pending-bar.show{display:flex}
.pending-bar .info{font-size:13px;font-weight:600;color:var(--gold)}
.pending-bar .info small{font-weight:400;color:var(--muted);font-size:12px}
.pending-bar button{background:var(--green);color:#111;border:none;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.pending-bar button:hover{background:#16a34a}

/* Deploy */
.deploy-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-top:24px;display:none}
.deploy-section.show{display:block}
.deploy-section h3{font-size:18px;margin-bottom:8px;text-align:center}
.deploy-section>p{color:var(--muted);font-size:13px;margin-bottom:20px;text-align:center;line-height:1.6}
.github-setup{max-width:500px;margin:0 auto 20px}
.github-setup label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
.github-setup input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:monospace;outline:none;margin-bottom:10px}
.github-setup input:focus{border-color:var(--gold)}
.github-setup .hint{font-size:11px;color:var(--muted);line-height:1.6}
.btn-deploy-now{display:block;margin:0 auto;background:var(--green);color:#111;border:none;padding:14px 40px;border-radius:25px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-deploy-now:hover{background:#16a34a}
.btn-deploy-now:disabled{opacity:.4;cursor:not-allowed}
.deploy-log{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:16px;font-size:12px;font-family:monospace;color:var(--muted);max-height:300px;overflow-y:auto;display:none;white-space:pre-wrap;line-height:1.6}
.deploy-log.show{display:block}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:#fff;padding:14px 28px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transition:transform .4s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:400px;width:100%;text-align:center}
.modal h3{font-size:18px;margin-bottom:8px}
.modal p{color:var(--muted);font-size:13px;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:center}
.modal-actions button{padding:10px 24px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-actions .confirm{background:var(--red);color:#fff}.modal-actions .confirm:hover{background:#dc2626}
.modal-actions .cancel{background:var(--border);color:var(--text)}.modal-actions .cancel:hover{background:#555}

@media(max-width:640px){
  .prod-grid{grid-template-columns:1fr}
  .hdr{padding:12px 16px}
  .stats{padding:12px 16px}
  .container{padding:16px}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="icon">📸</div>
    <h1>🐼 產品相片管理</h1>
    <p>Panda Telecom 熊貓電訊 · 後台上載產品相</p>
    <input type="password" id="loginPass" placeholder="管理密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登入</button>
    <div class="error" id="loginError">❌ 密碼錯誤，請再試</div>
  </div>
</div>

<!-- ═══ ADMIN ═══ -->
<div class="admin-screen" id="adminScreen">
  <div class="hdr">
    <h2>📸 產品相片管理 <small style="font-weight:400;font-size:12px;color:var(--muted)"> 熊貓電訊</small></h2>
    <div class="hdr-actions">
      <a class="btn-preview" href="https://pandatelecom.github.io/Pandatelecom/products.html" target="_blank">🔗 預覽網站</a>
      <button class="btn-deploy" id="headerDeployBtn" onclick="scrollToDeploy()">🚀 發布到 GitHub</button>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="stats" id="statsBar"></div>

  <div class="container" id="mainContainer">
    <!-- Pending Changes Bar -->
    <div class="pending-bar" id="pendingBar">
      <div class="info" id="pendingInfo">📸 <span id="pendingCount">0</span> 張新相片待發布 <small>（未上傳到 GitHub）</small></div>
      <button onclick="scrollToDeploy()">🚀 去發布</button>
    </div>

    <!-- Search & Filters -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="🔍 搜尋產品名稱 / SKU..." oninput="renderProducts()">
      <select id="catFilter" onchange="renderProducts()"><option value="">全部類別</option></select>
    </div>
    <div class="filter-btns" id="photoFilter">
      <button class="filter-btn active" onclick="setFilter(this,'')">📷 全部</button>
      <button class="filter-btn g" onclick="setFilter(this,'has')">✅ 已有相</button>
      <button class="filter-btn r" onclick="setFilter(this,'none')">❌ 未上相</button>
    </div>

    <!-- Product Grid -->
    <div id="productList"></div>

    <!-- Deploy Section -->
    <div class="deploy-section" id="deploySection">
      <h3>🚀 發布相片上網</h3>
      <p>將新上載嘅相片上傳到 GitHub，等 1-2 分鐘網站就會自動更新</p>
      <div class="github-setup">
        <label>🔑 GitHub Token</label>
        <input type="text" id="f_token" placeholder="ghp_xxx...xxxx" value="">
        <div class="hint">第一次用要填 Token。去 <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--gold)">github.com/settings/tokens</a> 建立（要剔 <strong>repo</strong> 權限），貼上去就得。之後會自動 save 喺瀏覽器。</div>
        <label>Repository</label>
        <input type="text" id="f_repo" value="pandatelecom/Pandatelecom">
        <div class="hint">已設定為 pandatelecom/Pandatelecom，唔使改</div>
      </div>
      <button class="btn-deploy-now" id="deployBtn" onclick="doDeploy()">🚀 上傳相片到 GitHub</button>
      <div class="deploy-log" id="deployLog"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">⚠️</h3>
    <p id="modalText"></p>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">取消</button>
      <button class="confirm" id="modalConfirmBtn">確認</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   STATE
   ═══════════════════════════════════════ */
const ADMIN_PASSWORD = 'panda2024';
let products = [];
let imgMap = {};
let pendingNew = {}; // sku -> { file, dataUrl }
let filterMode = '';

/* ═══════════════════════════════════════
   LOGIN
   ═══════════════════════════════════════ */
function doLogin() {
  if(document.getElementById('loginPass').value === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    init();
    const saved = localStorage.getItem('pandaPhotosToken');
    if(saved) document.getElementById('f_token').value = saved;
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPass').focus();
  }
}
function doLogout() {
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display = 'none';
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
async function init() {
  try {
    const r1 = await fetch('products-data.js?' + Date.now());
    const txt = await r1.text();
    eval(txt);
    products = DATA.products;
    try {
      const r2 = await fetch('products-img-map.js?' + Date.now());
      eval(await r2.text());
      imgMap = PROD_IMG || {};
    } catch(e) { imgMap = {}; }
    const cats = [...new Set(products.map(p => p.cat).filter(Boolean))];
    const sel = document.getElementById('catFilter');
    cats.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
    updateStatsAndPending();
    renderProducts();
  } catch(e) {
    showToast('❌ 無法載入: ' + e.message, true);
  }
}

function updateStatsAndPending() {
  const has = products.filter(p => imgMap[p.sku]).length;
  const none = products.filter(p => !imgMap[p.sku]).length;
  const pend = Object.keys(pendingNew).length;
  document.getElementById('statsBar').innerHTML =
    '<span class="stat blue">📦 ' + products.length + ' 件產品</span>' +
    '<span class="stat green">✅ ' + has + ' 件有相</span>' +
    '<span class="stat red">❌ ' + none + ' 件未上相</span>' +
    (pend ? '<span class="stat gold">📸 ' + pend + ' 張待發布</span>' : '');
  const bar = document.getElementById('pendingBar');
  if(pend > 0) {
    bar.classList.add('show');
    document.getElementById('pendingCount').textContent = pend;
  } else {
    bar.classList.remove('show');
  }
}

/* ═══════════════════════════════════════
   RENDER
   ═══════════════════════════════════════ */
function setFilter(btn, mode) {
  filterMode = mode;
  document.querySelectorAll('#photoFilter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function renderProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('catFilter').value;
  let list = products.filter(p => {
    if(q && !p.name.toLowerCase().includes(q) && !(p.sku||'').toLowerCase().includes(q)) return false;
    if(cat && p.cat !== cat) return false;
    const has = !!imgMap[p.sku];
    if(filterMode === 'has' && !has) return false;
    if(filterMode === 'none' && has) return false;
    return true;
  });
  const el = document.getElementById('productList');
  if(!list.length) { el.innerHTML = '<div class="empty-state"><span class="big">🔍</span><p>冇符合條件嘅產品</p></div>'; return; }
  let html = '<div class="prod-grid">';
  list.forEach(p => {
    const has = !!imgMap[p.sku];
    const isPending = !!pendingNew[p.sku];
    const imgUrl = isPending ? pendingNew[p.sku].dataUrl : (imgMap[p.sku] || '');
    html += `<div class="prod-card">
      <div class="top">
        <div class="thumb">
          ${imgUrl ? '<img src="'+imgUrl+'" alt="'+p.name+'" loading="lazy">' : '<span>📦</span>'}
          ${isPending ? '<span class="pending-badge">🆕</span>' : ''}
        </div>
        <div class="info">
          <div class="sku">${p.sku || '—'}</div>
          <div class="name">${p.name}</div>
          <div class="cat">${p.cat || ''} · $${p.srp}</div>
        </div>
      </div>
      <div class="bottom">
        <span class="photo-badge ${isPending ? 'pending' : has ? 'yes' : 'no'}">${isPending ? '🆕 新相' : has ? '✅ 有相' : '❌ 無相'}</span>
        ${isPending
          ? '<button class="btn-photo btn-del" onclick="removePending(\''+p.sku+'\')">✕ 取消</button>'
          : '<button class="btn-photo '+(has?'btn-replace':'btn-add')+'" onclick="pickPhoto(\''+p.sku+'\')">'+(has?'🔄 換相':'📤 上載相片')+'</button>'
        }
        ${has && !isPending ? '<button class="btn-photo btn-del" onclick="confirmRemove(\''+p.sku+'\')">🗑️ 刪除</button>' : ''}
        <input type="file" accept="image/*" id="fp_${p.sku}" onchange="handlePick('${p.sku}',this)">
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

/* ═══════════════════════════════════════
   PHOTO PICKING — 揀相就即刻 assign
   ═══════════════════════════════════════ */
function pickPhoto(sku) {
  document.getElementById('fp_' + sku).click();
}

function handlePick(sku, input) {
  if(!input.files || !input.files.length) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    pendingNew[sku] = { file: file, dataUrl: e.target.result };
    showToast('✅ ' + (sku||'') + ' — 已加入新相片，記得發布');
    updateStatsAndPending();
    renderProducts();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function removePending(sku) {
  delete pendingNew[sku];
  showToast('已取消 ' + sku + ' 嘅新相片');
  updateStatsAndPending();
  renderProducts();
}

/* ═══════════════════════════════════════
   DELETE CONFIRM
   ═══════════════════════════════════════ */
function confirmRemove(sku) {
  const p = products.find(x => x.sku === sku);
  showModal('🗑️ 刪除相片', '確定移除 <strong>'+(sku||'')+'</strong> 嘅相片？', () => {
    delete imgMap[sku];
    updateStatsAndPending();
    renderProducts();
    showToast('✅ 已移除，發布後生效');
  });
}

/* ═══════════════════════════════════════
   DEPLOY
   ═══════════════════════════════════════ */
function scrollToDeploy() {
  document.getElementById('deploySection').classList.add('show');
  document.getElementById('deploySection').scrollIntoView({ behavior: 'smooth' });
}

async function doDeploy() {
  const token = document.getElementById('f_token').value.trim();
  const repo = document.getElementById('f_repo').value.trim();
  if(!token) { showToast('❌ 請先填 GitHub Token', true); return; }
  localStorage.setItem('pandaPhotosToken', token);

  const skus = Object.keys(pendingNew);
  if(!skus.length) { showToast('⚠️ 冇新相片需要上載', true); return; }

  const btn = document.getElementById('deployBtn');
  const log = document.getElementById('deployLog');
  btn.disabled = true;
  btn.textContent = '⏳ 上傳中...';
  log.classList.add('show');
  log.textContent = '🚀 開始上傳...\n';

  function logLine(m) { log.textContent += m + '\n'; log.scrollTop = log.scrollHeight; }
  let success = 0, fail = 0;

  try {
    logLine('📡 連接 GitHub...\n');

    for(let i = 0; i < skus.length; i++) {
      const sku = skus[i];
      const item = pendingNew[sku];
      const ext = item.file.name.split('.').pop().toLowerCase();
      const ghPath = 'Pandatelecom/products-img/' + sku + '.' + ext;
      const b64 = item.dataUrl.split(',')[1];

      logLine('📤 ['+(i+1)+'/'+skus.length+'] ' + sku + '.' + ext + '...');

      // Check existing
      let sha = '';
      const getR = await fetch('https://api.github.com/repos/'+repo+'/contents/'+ghPath+'?ref=main', {
        headers: { 'Authorization': 'Bearer '+token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if(getR.ok) sha = (await getR.json()).sha;

      const putR = await fetch('https://api.github.com/repos/'+repo+'/contents/'+ghPath, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer '+token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({
          message: '📸 上載產品相: '+sku,
          content: b64,
          sha: sha || undefined
        })
      });

      if(putR.ok) {
        const rawUrl = 'https://raw.githubusercontent.com/'+repo+'/main/'+ghPath;
        imgMap[sku] = rawUrl;
        delete pendingNew[sku];
        success++;
        logLine('✅ ' + sku + '.' + ext + ' 成功');
      } else {
        const err = await putR.text();
        logLine('❌ ' + sku + ' 失敗: ' + err.substring(0,120));
        fail++;
      }
    }

    // Update products-img-map.js
    if(success > 0) {
      logLine('\n📝 更新 products-img-map.js...');
      const mapContent = 'const PROD_IMG = ' + JSON.stringify(imgMap, null, 2) + ';';
      const getM = await fetch('https://api.github.com/repos/'+repo+'/contents/Pandatelecom/products-img-map.js?ref=main', {
        headers: { 'Authorization': 'Bearer '+token, 'Accept': 'application/vnd.github.v3+json' }
      });
      let shaM = '';
      if(getM.ok) shaM = (await getM.json()).sha;
      const putM = await fetch('https://api.github.com/repos/'+repo+'/contents/Pandatelecom/products-img-map.js', {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer '+token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({
          message: '📸 更新產品相片對應表',
          content: btoa(unescape(encodeURIComponent(mapContent))),
          sha: shaM || undefined
        })
      });
      if(putM.ok) logLine('✅ products-img-map.js 已更新');
      else logLine('⚠️ products-img-map.js 更新可能有問題');
    }

    logLine('\n✅ 完成！' + success + ' 張成功' + (fail ? ', '+fail+' 張失敗' : ''));
    logLine('⏳ GitHub Pages 自動部署中，約 1-2 分鐘...');
    logLine('🔗 https://pandatelecom.github.io/Pandatelecom/products.html');

    updateStatsAndPending();
    renderProducts();
    showToast('🎉 ' + success + ' 張相已上傳！1-2分鐘後網站更新');

    btn.textContent = '✅ 上傳完成！';
    setTimeout(() => { btn.disabled = false; btn.textContent = '🚀 上傳相片到 GitHub'; }, 3000);
  } catch(e) {
    logLine('❌ 錯誤: ' + e.message);
    btn.disabled = false;
    btn.textContent = '🚀 上傳相片到 GitHub';
    showToast('❌ 上載失敗', true);
  }
}

/* ═══════════════════════════════════════
   TOAST & MODAL
   ═══════════════════════════════════════ */
let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  requestAnimationFrame(() => t.classList.add('show'));
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

let modalCb;
function showModal(title, text, cb) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').innerHTML = text;
  modalCb = cb;
  document.getElementById('modalConfirmBtn').onclick = () => { closeModal(); if(modalCb) modalCb(); };
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
</script>
